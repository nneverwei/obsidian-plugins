name: Release tagged version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' auto-convert/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create zip package
        run: |
          cd auto-convert
          zip -r ../auto-convert-${{ steps.version.outputs.version }}.zip . \
            -x ".claude/*" ".DS_Store"

      - name: Create GitHub release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "auto-convert-${{ steps.version.outputs.version }}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release for auto-convert version ${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
